<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d6a4f" />
  <title>植栽メモ — エリアの写真・メモを編集</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./growth.css" />
</head>
<body>
  <main class="panel growth-panel">
    <nav class="top growth-nav-top" aria-label="パンくずリスト">
      <ol class="growth-breadcrumb">
        <li><a href="./index.html">ホーム</a></li>
        <li><a href="./plants.html">植栽一覧</a></li>
        <li aria-current="page" id="area-edit-breadcrumb-current">エリアを編集</li>
      </ol>
      <div class="growth-nav-extra">
        <a href="./sitemap.html">サイトマップ</a>
        <a href="./growth-edit.html">記録の追加・編集</a>
      </div>
    </nav>

    <div id="area-edit-toast" class="growth-toast" role="status" aria-live="polite"></div>

    <header class="page-header">
      <p class="eyebrow">Planting · Area</p>
      <h1 id="area-edit-page-title">エリアの写真・メモを編集</h1>
      <p id="area-edit-context-line" class="lead plant-detail-area-line" hidden></p>
      <p id="area-edit-page-lead" class="lead">
        エリア全体の<strong>概要・本文</strong>と<strong>登録写真</strong>を保存します（本番の Vercel + トークンが必要）。閲覧は <a href="./area.html">エリア時系列</a> から。
      </p>
    </header>

    <section class="growth-section" aria-labelledby="area-edit-connection-h2">
      <h2 id="area-edit-connection-h2">保存先への接続</h2>
      <p id="area-edit-cloud-status" class="growth-hint growth-status" aria-live="polite"></p>
      <div class="growth-token-row">
        <label class="block" style="flex: 1; min-width: 200px">
          <span class="growth-label-with-info">アップロード用トークン（成長記録と同じ）</span>
          <input id="area-edit-cloud-token" type="password" autocomplete="off" placeholder="サイト管理者が設定した文字列" />
        </label>
        <button type="button" id="area-edit-cloud-token-save" class="growth-secondary" style="align-self: end">
          保存
        </button>
      </div>
    </section>

    <form id="area-edit-form" class="growth-section growth-section--composer growth-form">
      <h2>エリアを選ぶ</h2>
      <label class="block">
        <span class="growth-label">エリア</span>
        <select id="area-edit-area" required></select>
      </label>

      <label class="block">
        <span class="growth-label">記録日</span>
        <input id="area-edit-record-date" type="date" required />
      </label>

      <label class="block">
        <span class="growth-label">記録メモ（任意）</span>
        <textarea id="area-edit-record-note" rows="3" class="growth-textarea"></textarea>
      </label>

      <label class="block">
        <span class="growth-label">概要（1〜2文）</span>
        <textarea id="area-edit-summary" rows="3" class="growth-textarea"></textarea>
      </label>

      <label class="block">
        <span class="growth-label">本文（段落は空行で区切り）</span>
        <textarea id="area-edit-body" rows="8" class="growth-textarea"></textarea>
      </label>

      <div class="section-heading-row">
        <h2>エリア全体の写真</h2>
      </div>
      <p class="growth-hint">最大 12 枚。保存すると Blob にアップロードされます（差し替え時は既存分も含めて再アップロードされます）。</p>
      <div class="growth-photo-pick-row">
        <input
          id="area-edit-photo-library"
          type="file"
          accept="image/*"
          multiple
          class="growth-file-input-hidden"
          tabindex="-1"
        />
        <label for="area-edit-photo-library" class="growth-secondary growth-photo-pick-label">写真を追加</label>
        <button type="button" id="area-edit-photo-clear" class="growth-secondary" hidden>すべて外す</button>
      </div>
      <div id="area-edit-photo-queue-wrap" class="growth-photo-queue-wrap">
        <div id="area-edit-photo-queue" class="growth-photo-queue" aria-live="polite"></div>
        <p id="area-edit-photo-queue-empty" class="growth-hint growth-photo-queue-empty">写真はまだありません。</p>
      </div>

      <p class="growth-actions">
        <button type="submit" id="area-edit-save" class="growth-primary">保存する</button>
        <a href="./growth-edit.html" class="plant-detail-link" style="margin-left: 0.75rem">成長記録の編集へ</a>
      </p>
    </form>
  </main>
